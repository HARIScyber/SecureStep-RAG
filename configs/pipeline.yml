pipeline:
  max_hops: 3
  trust_threshold: 60
  confidence_threshold: 70
  top_k: 6
  retrieval_collection: securestep_docs
  trust_weights:
    semantic: 0.3
    source: 0.2
    injection: 0.3
    hop: 0.2
  confidence:
    base: 45
    trust_component_weight: 0.4
    context_component_weight: 0.2

models:
  provider_env_var: MODEL_PROVIDER
  default_provider: openai
  default_model: gpt-4o-mini

embeddings:
  model_name: BAAI/bge-m3
  vector_size: 1024
